<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directory — Slow Casa</title>
  <meta name="description" content="Every design-first vacation home in the Slow Casa directory. Filter by setting — sea, mountains, farm." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --black: #0f0f0f;
      --grey-1: #888888;
      --grey-2: #bbbbbb;
      --grey-3: #e8e8e8;
      --grey-4: #f5f5f3;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--sans); background: #f9f7f2; color: var(--black); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 28px 48px; border-bottom: 0.5px solid var(--grey-3); position: sticky; top: 0; background: var(--white); z-index: 100; }
    .wordmark { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; font-weight: 400; letter-spacing: 0.01em; text-align: center; color: var(--black); text-transform: none; }
    .nav-links { display: flex; gap: 32px; list-style: none; justify-content: flex-end; }
    .nav-links a { font-size: 13px; color: var(--grey-1); letter-spacing: 0.03em; transition: color 0.2s; }
    .nav-links a:hover { color: var(--black); }

    .page-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px 48px 56px;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .page-subline {
      font-family: var(--serif);
      font-size: 48px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 32px;
      transition: opacity 0.4s ease;
    }

    .dir-search-wrap { position: relative; max-width: 480px; }

    .dir-search-input {
      width: 100%;
      font-family: var(--sans);
      font-size: 15px;
      padding: 15px 90px 15px 20px;
      border: 0.5px solid var(--grey-3);
      background: var(--white);
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.01em;
    }

    .dir-search-input:focus { border-color: var(--black); }
    .dir-search-input::placeholder { color: var(--grey-2); }

    .dir-search-btn {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      padding: 0 20px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #8B7355;
      color: var(--white);
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dir-search-btn:hover { background: #6B5635; }

    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--white);
      border: 0.5px solid var(--grey-3);
      border-top: none;
      z-index: 9999;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .search-dropdown.open { display: block; }

    .dropdown-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-1);
      padding: 12px 20px 6px;
    }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--black);
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
      border: none;
      background: none;
      font-family: var(--sans);
    }

    .dropdown-item:hover { background: var(--grey-4); }

    .filters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 48px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .filter-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-right: 8px;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 16px;
      border: 0.5px solid var(--grey-3);
      background: transparent;
      color: var(--grey-1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active { background: var(--black); border-color: var(--black); color: var(--white); }

    .directory-meta {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .property-count { font-size: 12px; color: var(--grey-1); letter-spacing: 0.04em; }

    .section { max-width: 1200px; margin: 0 auto; padding: 0 48px 80px; }

    .property-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 32px; }

    .property-card { cursor: pointer; }

    .card-img { width: 100%; aspect-ratio: 4/3; overflow: hidden; margin-bottom: 16px; background: var(--grey-4); position: relative; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; top: 0; left: 0; transition: opacity 0.4s ease; }
    .card-img img.img-primary { opacity: 1; }
    .card-img img.img-secondary { opacity: 0; }
    .property-card:hover .card-img img.img-primary { opacity: 0; }
    .property-card:hover .card-img img.img-secondary { opacity: 1; }
    .card-img-placeholder { width: 100%; height: 100%; background: var(--grey-4); }

    .card-location { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-1); margin-bottom: 6px; }
    .card-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
    .card-detail { font-size: 13px; color: var(--grey-1); line-height: 1.5; margin-bottom: 12px; }
    .card-tag { display: inline-block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey-1); border: 0.5px solid var(--grey-3); padding: 4px 10px; }

    .loading { grid-column: 1 / -1; text-align: center; padding: 80px 48px; font-size: 13px; color: var(--grey-1); letter-spacing: 0.06em; }
    .no-results { grid-column: 1 / -1; text-align: center; padding: 80px 48px; }
    .no-results p { font-size: 15px; color: var(--grey-1); }

    .skeleton { background: var(--grey-4); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    footer { padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; border-top: 0.5px solid var(--grey-3); }
    .footer-word { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--grey-1); }
    .footer-links { display: flex; gap: 28px; }
    .footer-links a { font-size: 12px; color: var(--grey-1); transition: color 0.2s; }
    .footer-links a:hover { color: var(--black); }

    .fade-in { opacity: 0; transform: translateY(12px); animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .wordmark { font-size: 22px; }
      .page-header { padding: 40px 24px 32px; }
      .page-subline { font-size: 30px; }
      .filters { padding: 20px 24px; flex-wrap: wrap; }
      .directory-meta { padding: 16px 24px; }
      .section { padding: 0 24px 56px; }
      .property-grid { grid-template-columns: 1fr; gap: 40px; }
      footer { padding: 24px; flex-direction: column; gap: 20px; text-align: center; }
      .footer-links { flex-wrap: wrap; justify-content: center; gap: 16px; }
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B930Z6F96Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B930Z6F96Z');
  </script>
</head>
<body>

  <nav>
    <div></div>
    <a href="/" class="wordmark">Slow Casa</a>
    <ul class="nav-links">
      <li><a href="/directory">Directory</a></li>
      <li><a href="/journal">Journal</a></li>
      <li><a href="https://slowcasa.beehiiv.com/subscribe" target="_blank" rel="noopener">Newsletter</a></li>
      <li><a href="/criteria">About</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <p class="page-subline" id="dir-sub">Modern vacation homes, rooted in nature.</p>
    <div class="dir-search-wrap">
      <input class="dir-search-input" type="text" placeholder="Where do you want to go?" id="dir-search" autocomplete="off" />
      <button class="dir-search-btn" onclick="goToLocation(document.getElementById('dir-search').value || '')">Search</button>
      <div class="search-dropdown" id="dir-dropdown">
        <p class="dropdown-label">Popular locations</p>
        <button class="dropdown-item" onclick="goToLocation('Mallorca')">Mallorca</button>
        <button class="dropdown-item" onclick="goToLocation('Ibiza')">Ibiza</button>
        <button class="dropdown-item" onclick="goToLocation('Menorca')">Menorca</button>
        <button class="dropdown-item" onclick="goToLocation('Catalonia')">Catalonia</button>
        <button class="dropdown-item" onclick="goToLocation('Algarve')">Algarve</button>
        <button class="dropdown-item" onclick="goToLocation('Puglia')">Puglia</button>
        <button class="dropdown-item" onclick="goToLocation('Corsica')">Corsica</button>
      </div>
    </div>
  </div>

  <div class="filters">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Sea', this)">Sea</button>
    <button class="filter-btn" onclick="setFilter('Mountains', this)">Mountains</button>
    <button class="filter-btn" onclick="setFilter('Farm', this)">Farm</button>
  </div>

  <div class="directory-meta">
    <span class="property-count" id="property-count"></span>
  </div>

  <div class="section">
    <div class="property-grid" id="property-grid">
      <div class="loading">Loading properties...</div>
    </div>
  </div>

  <div id="load-more-wrap" style="display:none;text-align:center;padding:48px 0 80px;">
    <button onclick="loadMore()" style="font-family:var(--sans);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:14px 40px;border:0.5px solid var(--black);background:transparent;color:var(--black);cursor:pointer;transition:background 0.2s,color 0.2s;" onmouseover="this.style.background='var(--black)';this.style.color='var(--white)'" onmouseout="this.style.background='transparent';this.style.color='var(--black)'">View more</button>
  </div>

  <footer>
    <span class="footer-word" style="font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#888888;">Slow Casa</span>
    <div class="footer-links">
      <a href="/directory">Directory</a>
      <a href="https://slowcasa.beehiiv.com/subscribe" target="_blank" rel="noopener">Newsletter</a>
      <a href="https://www.instagram.com/theslowcasa/" target="_blank" rel="noopener">Instagram</a>
    </div>
  </footer>

  <script>
    var allRecords = [];
    var activeFilter = 'all';
    var locationQuery = new URLSearchParams(window.location.search).get('location') || '';
    var PAGE_SIZE = 30;
    var currentPage = 0;
    var currentFiltered = [];

    // Pre-fill search if location param exists
    if (locationQuery) {
      document.getElementById('dir-search').value = locationQuery;
    }

    // Rotating subheadline
    var sublines = [
      'Modern vacation homes, rooted in nature.',
      'Handpicked architectural homes across Europe.',
      'Try second home locations before you buy.'
    ];
    var subIndex = 0;
    var subEl = document.getElementById('dir-sub');
    setInterval(function() {
      subEl.style.opacity = '0';
      setTimeout(function() {
        subIndex = (subIndex + 1) % sublines.length;
        subEl.textContent = sublines[subIndex];
        subEl.style.opacity = '1';
      }, 400);
    }, 4000);

    // Search
    var searchInput = document.getElementById('dir-search');
    var searchDropdown = document.getElementById('dir-dropdown');

    searchInput.addEventListener('focus', function() {
      if (!locationQuery) searchDropdown.classList.add('open');
    });

    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && searchInput.value.trim()) {
        goToLocation(searchInput.value.trim());
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.dir-search-wrap')) {
        searchDropdown.classList.remove('open');
      }
    });

    function goToLocation(location) {
      window.location.href = '/directory?location=' + encodeURIComponent(location);
    }

    async function fetchProperties() {
      try {
        var res = await fetch('/api/properties?all=true');
        var data = await res.json();
        return data.records || [];
      } catch (err) {
        console.error('Fetch error:', err);
        return [];
      }
    }

    function getImageUrl(record, index) {
      index = index || 0;
      var heroImg = record.fields && record.fields['Hero Image'];
      if (index === 0 && heroImg) return heroImg;
      var images = record.fields['Images'];
      if (images && images.length > index) {
        if (images[index].thumbnails && images[index].thumbnails.full) return images[index].thumbnails.full.url;
        return images[index].url;
      }
      return null;
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderProperties(allRecords);
    }

    function renderCard(record, i) {
      var f = record.fields;
      var imgUrl = getImageUrl(record, 0);
      var imgUrl2 = getImageUrl(record, 1) || imgUrl;
      var location = f['Location label'] || '';
      var name = f['Name'] || '';
      var desc = f['Description'] ? f['Description'].substring(0, 80) + '...' : '';
      var tag = f['Tags'] && f['Tags'].length ? f['Tags'][0] : '';
      var delay = i < 6 ? 'style="animation-delay:' + (i * 0.05) + 's"' : '';
      var slug = f['Slug'];
      var url = slug ? '/properties/' + slug : '/property.html?id=' + record.id;
      return '<a href="' + url + '" style="text-decoration:none;color:inherit;">' +
        '<div class="property-card fade-in" ' + delay + '>' +
          '<div class="card-img">' +
            (imgUrl ? '<img src="' + imgUrl + '" alt="' + name + '" loading="lazy" class="img-primary" />' : '') +
            (imgUrl2 ? '<img src="' + imgUrl2 + '" alt="' + name + '" loading="lazy" class="img-secondary" />' : '') +
          '</div>' +
          '<p class="card-location">' + location + '</p>' +
          '<p class="card-name">' + name + '</p>' +
          '<p class="card-detail">' + desc + '</p>' +
          (tag ? '<span class="card-tag">' + tag + '</span>' : '') +
        '</div>' +
      '</a>';
    }

    function renderProperties(records) {
      var grid = document.getElementById('property-grid');
      var count = document.getElementById('property-count');

      var filtered = records.filter(function(r) {
        return r.fields['Name'] && r.fields['Images'] && r.fields['Images'].length > 0;
      });

      filtered.sort(function(a, b) {
        var da = a.fields['Date added'] ? new Date(a.fields['Date added']) : new Date(0);
        var db = b.fields['Date added'] ? new Date(b.fields['Date added']) : new Date(0);
        return db - da;
      });

      if (locationQuery) {
        var q = locationQuery.toLowerCase();
        filtered = filtered.filter(function(r) {
          var f = r.fields;
          return (f['Region'] || '').toLowerCase().includes(q) ||
                 (f['Country'] || '').toLowerCase().includes(q) ||
                 (f['Town'] || '').toLowerCase().includes(q) ||
                 (f['Location label'] || '').toLowerCase().includes(q);
        });
      }

      if (activeFilter !== 'all') {
        filtered = filtered.filter(function(r) {
          var tags = r.fields['Tags'];
          return tags && tags.indexOf(activeFilter) !== -1;
        });
      }

      currentFiltered = filtered;
      currentPage = 0;

      var countText = filtered.length + (filtered.length === 1 ? ' property' : ' properties');
      if (locationQuery) countText = filtered.length + ' ' + (filtered.length === 1 ? 'property' : 'properties') + ' in ' + locationQuery;
      count.textContent = countText;

      if (!filtered.length) {
        grid.innerHTML = '<div class="no-results"><p>No properties found.</p></div>';
        document.getElementById('load-more-wrap').style.display = 'none';
        return;
      }

      var page = filtered.slice(0, PAGE_SIZE);
      grid.innerHTML = page.map(renderCard).join('');
      updateLoadMore();
    }

    function updateLoadMore() {
      var wrap = document.getElementById('load-more-wrap');
      var shown = (currentPage + 1) * PAGE_SIZE;
      if (shown < currentFiltered.length) {
        wrap.style.display = 'block';
      } else {
        wrap.style.display = 'none';
      }
    }

    function loadMore() {
      currentPage++;
      var grid = document.getElementById('property-grid');
      var start = currentPage * PAGE_SIZE;
      var nextPage = currentFiltered.slice(start, start + PAGE_SIZE);
      grid.innerHTML += nextPage.map(renderCard).join('');
      updateLoadMore();
    }

    fetchProperties().then(function(records) {
      allRecords = records;
      renderProperties(allRecords);
    });
  </script>

</body>
</html>
