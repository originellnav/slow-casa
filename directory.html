<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directory — Slow Casa</title>
  <meta name="description" content="Every design-first vacation home in the Slow Casa directory. Filter by setting — sea, mountains, farm." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --black: #0f0f0f;
      --grey-1: #888888;
      --grey-2: #bbbbbb;
      --grey-3: #e8e8e8;
      --grey-4: #f5f5f3;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--sans); background: var(--white); color: var(--black); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 28px 48px; border-bottom: 0.5px solid var(--grey-3); position: sticky; top: 0; background: var(--white); z-index: 100; }
    .wordmark { font-family: 'Archivo Black', sans-serif; font-size: 22px; font-weight: 400; letter-spacing: 0.06em; text-align: center; color: var(--black); text-transform: uppercase; }
    .nav-links { display: flex; gap: 32px; list-style: none; justify-content: flex-end; }
    .nav-links a { font-size: 13px; color: var(--grey-1); letter-spacing: 0.03em; transition: color 0.2s; }
    .nav-links a:hover { color: var(--black); }

    .page-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 48px 48px;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .page-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 16px;
    }

    .page-title {
      font-family: var(--serif);
      font-size: 42px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 0;
    }

    .filters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 48px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .filter-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-right: 8px;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 16px;
      border: 0.5px solid var(--grey-3);
      background: transparent;
      color: var(--grey-1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--black); color: var(--black); }

    .filter-btn.active {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .directory-meta {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .property-count {
      font-size: 12px;
      color: var(--grey-1);
      letter-spacing: 0.04em;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 80px;
    }

    .property-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px 32px;
    }

    .property-card { cursor: pointer; }
    .property-card:hover .card-img img { transform: scale(1.03); }

    .card-img { width: 100%; aspect-ratio: 4/3; overflow: hidden; margin-bottom: 16px; background: var(--grey-4); }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display: block; }
    .card-img-placeholder { width: 100%; height: 100%; background: var(--grey-4); }

    .card-location { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-1); margin-bottom: 6px; }
    .card-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
    .card-detail { font-size: 13px; color: var(--grey-1); line-height: 1.5; margin-bottom: 12px; }
    .card-tag { display: inline-block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey-1); border: 0.5px solid var(--grey-3); padding: 4px 10px; }

    .loading { grid-column: 1 / -1; text-align: center; padding: 80px 48px; font-size: 13px; color: var(--grey-1); letter-spacing: 0.06em; }
    .no-results { grid-column: 1 / -1; text-align: center; padding: 80px 48px; }
    .no-results p { font-size: 15px; color: var(--grey-1); }

    .skeleton { background: var(--grey-4); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    footer { padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; border-top: 0.5px solid var(--grey-3); }
    .footer-word { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--grey-1); }
    .footer-links { display: flex; gap: 28px; }
    .footer-links a { font-size: 12px; color: var(--grey-1); transition: color 0.2s; }
    .footer-links a:hover { color: var(--black); }

    .fade-in { opacity: 0; transform: translateY(12px); animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .page-header { padding: 40px 24px 32px; }
      .page-title { font-size: 30px; }
      .filters { padding: 20px 24px; flex-wrap: wrap; }
      .directory-meta { padding: 16px 24px; }
      .section { padding: 0 24px 56px; }
      .property-grid { grid-template-columns: 1fr; gap: 40px; }
      footer { padding: 24px; flex-direction: column; gap: 20px; text-align: center; }
      .footer-links { flex-wrap: wrap; justify-content: center; gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div></div>
    <a href="/" class="wordmark">Slow Casa</a>
    <ul class="nav-links">
      <li><a href="/directory">Directory</a></li>
      <li><a href="/journal">Journal</a></li>
      <li><a href="https://slowcasa.beehiiv.com/subscribe" target="_blank" rel="noopener">Newsletter</a></li>
      <li><a href="/criteria">About</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <p class="page-label">Design-first homes in nature · Europe</p>
    <h1 class="page-title">The directory</h1>
  </div>

  <div class="filters">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Sea', this)">Sea</button>
    <button class="filter-btn" onclick="setFilter('Mountains', this)">Mountains</button>
    <button class="filter-btn" onclick="setFilter('Farm', this)">Farm</button>
  </div>

  <div class="directory-meta">
    <span class="property-count" id="property-count"></span>
  </div>

  <div class="section">
    <div class="property-grid" id="property-grid">
      <div class="loading">Loading properties...</div>
    </div>
  </div>

  <footer>
    <span class="footer-word" style="font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#888888;">Slow Casa</span>
    <div class="footer-links">
      <a href="/directory">Directory</a>
      <a href="#">Newsletter</a>
      <a href="#">Submit a property</a>
      <a href="#">Instagram</a>
    </div>
  </footer>

  <script>
    var allRecords = [];
    var activeFilter = 'all';
    var locationQuery = new URLSearchParams(window.location.search).get('location') || '';

    async function fetchProperties() {
      try {
        var res = await fetch('/api/properties?all=true');
        var data = await res.json();
        return data.records || [];
      } catch (err) {
        console.error('Fetch error:', err);
        return [];
      }
    }

    function getImageUrl(record) {
      var images = record.fields['Images'];
      if (images && images.length > 0) return images[0].url;
      return null;
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderProperties(allRecords);
    }

    function renderProperties(records) {
      var grid = document.getElementById('property-grid');
      var count = document.getElementById('property-count');

      var filtered = records;

      // Apply location search
      if (locationQuery) {
        var q = locationQuery.toLowerCase();
        filtered = filtered.filter(function(r) {
          var f = r.fields;
          return (f['Region'] || '').toLowerCase().includes(q) ||
                 (f['Country'] || '').toLowerCase().includes(q) ||
                 (f['Town'] || '').toLowerCase().includes(q) ||
                 (f['Location label'] || '').toLowerCase().includes(q);
        });
      }

      // Apply tag filter
      if (activeFilter !== 'all') {
        filtered = filtered.filter(function(r) {
          var tags = r.fields['Tags'];
          return tags && tags.indexOf(activeFilter) !== -1;
        });
      }

      var countText = filtered.length + (filtered.length === 1 ? ' property' : ' properties');
      if (locationQuery) countText = filtered.length + (filtered.length === 1 ? ' property' : ' properties') + ' in ' + locationQuery;
      count.textContent = countText;

      if (!filtered.length) {
        grid.innerHTML = '<div class="no-results"><p>No properties found.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(function(record, i) {
        var f = record.fields;
        var imgUrl = getImageUrl(record);
        var location = f['Location label'] || '';
        var name = f['Name'] || '';
        var desc = f['Description'] ? f['Description'].substring(0, 80) + '...' : '';
        var tag = f['Tags'] && f['Tags'].length ? f['Tags'][0] : '';
        var delay = i < 6 ? 'style="animation-delay:' + (i * 0.05) + 's"' : '';

        return '<a href="/property.html?id=' + record.id + '" style="text-decoration:none;color:inherit;">' +
          '<div class="property-card fade-in" ' + delay + '>' +
            '<div class="card-img">' +
              (imgUrl ? '<img src="' + imgUrl + '" alt="' + name + '" loading="lazy" />' : '<div class="card-img-placeholder skeleton"></div>') +
            '</div>' +
            '<p class="card-location">' + location + '</p>' +
            '<p class="card-name">' + name + '</p>' +
            '<p class="card-detail">' + desc + '</p>' +
            (tag ? '<span class="card-tag">' + tag + '</span>' : '') +
          '</div>' +
        '</a>';
      }).join('');
    }

    fetchProperties().then(function(records) {
      allRecords = records;
      renderProperties(allRecords);
    });
  </script>

</body>
</html>
