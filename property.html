<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slow Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/slow-casa.css" />
  <style>
    body { font-family: var(--sans); background: var(--white); color: var(--black); }

    nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 28px 48px; border-bottom: 0.5px solid var(--grey-3); position: sticky; top: 0; background: var(--white); z-index: 100; }
    .nav-links a { color: var(--grey-1); }
    .nav-links a:hover { color: var(--black); }

    /* HERO */
    .hero {
      width: 100%;
      height: 75vh;
      min-height: 400px;
      background: var(--grey-4);
      overflow: visible;
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-skeleton { width: 100%; height: 100%; background: var(--grey-4); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .hero-more-photos {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      background: rgba(255,255,255,0.9);
      border: none;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s;
      z-index: 10;
    }

    .hero-more-photos:hover { background: var(--white); }

    /* CONTENT */
    .content { max-width: 720px; margin: 0 auto; padding: 48px 48px 0; }

    .property-name {
      font-family: var(--serif);
      font-size: 48px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .property-quote {
      font-family: var(--serif);
      font-size: 22px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.45;
      color: var(--black);
      margin-bottom: 24px;
    }

    /* FULL DESCRIPTION */
    .description { padding: 0 0 40px; border-bottom: 0.5px solid var(--grey-3); }

    .description p { font-size: 17px; line-height: 1.85; color: var(--black); margin-bottom: 1.5em; }

    .description h2 {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 400;
      line-height: 1.25;
      margin: 2em 0 0.6em;
      letter-spacing: -0.01em;
    }

    /* GALLERY — 4 equal images, bottom-right has overlay button */
    .gallery { padding: 40px 0; border-bottom: 0.5px solid var(--grey-3); }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .gallery-cell {
      position: relative;
      overflow: hidden;
    }

    .gallery-cell img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .gallery-cell img:hover { opacity: 0.9; }

    .gallery-more-overlay {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      background: rgba(255,255,255,0.9);
      border: none;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s;
    }

    .gallery-more-overlay:hover { background: var(--white); }

    /* LIGHTBOX */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox-img { max-width: 90vw; max-height: 85vh; object-fit: contain; display: block; }
    .lightbox-close { position: absolute; top: 24px; right: 32px; color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; background: none; border: none; font-family: var(--sans); }
    .lightbox-close:hover { color: var(--white); }
    .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.6); font-size: 32px; cursor: pointer; padding: 16px; line-height: 1; }
    .lightbox-prev:hover, .lightbox-next:hover { color: var(--white); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-counter { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; }

    /* CTA */
    .cta-section { padding: 64px 0 80px; text-align: center; }
    .cta-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-1); margin-bottom: 24px; }
    .cta-button { display: inline-block; font-family: var(--sans); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 48px; border: 0.5px solid var(--black); background: transparent; color: var(--black); cursor: pointer; transition: background 0.2s, color 0.2s; }
    .cta-button:hover { background: var(--black); color: var(--white); }

    .loading-state { text-align: center; padding: 120px 48px; font-size: 13px; color: var(--grey-1); letter-spacing: 0.06em; }

    /* RELATED PROPERTIES */
    .related-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 80px;
      border-top: 0.5px solid var(--grey-3);
    }

    .related-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 20px 0 40px;
    }

    .related-label {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-1);
    }

    .related-link {
      font-size: 13px;
      color: var(--grey-1);
      transition: color 0.2s;
    }

    .related-link:hover { color: var(--black); }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .related-card { cursor: pointer; }
    .related-card:hover .related-img img { transform: scale(1.03); }

    .related-img {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      margin-bottom: 14px;
      background: var(--grey-4);
    }

    .related-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }

    .related-location {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 6px;
    }

    .related-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .related-desc {
      font-size: 13px;
      color: var(--grey-1);
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .hero { height: 55vh; }
      .content { padding: 32px 24px 0; }
      .property-name { font-size: 32px; }
      .property-quote { font-size: 18px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .cta-section { padding: 48px 0 64px; }
      .related-section { padding: 0 24px 56px; }
      .related-grid { grid-template-columns: 1fr; gap: 40px; }
      footer { padding: 24px; flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <nav>
    <div></div>
    <a href="/" class="wordmark">Slow Casa</a>
    <ul class="nav-links">
      <li><a href="/directory">Directory</a></li>
      <li><a href="/journal">Journal</a></li>
      <li><a href="https://slowcasa.beehiiv.com/subscribe" target="_blank" rel="noopener">Newsletter</a></li>
      <li><a href="/criteria">About</a></li>
    </ul>
  </nav>

  <div id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
    <button class="lightbox-prev" onclick="lightboxNav(-1)">&#8592;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <button class="lightbox-next" onclick="lightboxNav(1)">&#8594;</button>
    <span class="lightbox-counter" id="lightbox-counter"></span>
  </div>

  <div class="related-section" id="related-section" style="display:none">
    <div class="related-header">
      <span class="related-label">Related Properties</span>
      <a href="/directory" class="related-link">View all</a>
    </div>
    <div class="related-grid" id="related-grid"></div>
  </div>

  <footer>
    <span class="footer-word">Slow Casa</span>
    <div class="footer-links">
      <a href="/directory">← Back to directory</a>
    </div>
  </footer>

  <script>
    var RECORD_ID = new URLSearchParams(window.location.search).get('id');
    var allImages = [];
    var lightboxIndex = 0;

    async function fetchProperty() {
      if (!RECORD_ID) {
        document.getElementById('app').innerHTML = '<div class="loading-state">Property not found.</div>';
        return;
      }
      try {
        var res = await fetch('/api/property?id=' + RECORD_ID);
        var data = await res.json();
        if (data && data.fields) { renderProperty(data); }
        else { document.getElementById('app').innerHTML = '<div class="loading-state">Property not found.</div>'; }
      } catch (err) {
        document.getElementById('app').innerHTML = '<div class="loading-state">Something went wrong.</div>';
      }
    }

    function getBestImageUrl(img) {
      if (img.thumbnails && img.thumbnails.full && img.thumbnails.full.url) return img.thumbnails.full.url;
      return img.url;
    }

    function getImages(fields) {
      var all = [];
      if (fields['Images'] && fields['Images'].length) fields['Images'].forEach(function(img) { all.push(getBestImageUrl(img)); });
      if (fields['Gallery'] && fields['Gallery'].length) fields['Gallery'].forEach(function(img) { all.push(getBestImageUrl(img)); });
      return all;
    }

    function parseFullDescription(text) {
      if (!text) return '';
      var html = '';
      var firstQuoteDone = false;

      // Normalise bold headers: **Header** or **Header ** at start of content
      // Split on bold patterns that look like headings
      text = text.replace(/\*\*([^*]+?)\s*\*\*/g, function(match, inner) {
        var trimmed = inner.trim();
        // Treat as heading if it looks like a section title (short, no sentence punctuation mid-text)
        if (trimmed.length < 60 && !trimmed.match(/[,;]/)) {
          return '\n## ' + trimmed + '\n';
        }
        return '<strong>' + trimmed + '</strong>';
      });

      var lines = text.split('\n');
      var inParagraph = false;

      lines.forEach(function(line) {
        line = line.trim();
        if (!line) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          return;
        }
        if (line.startsWith('## ')) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          html += '<h2>' + line.replace('## ', '') + '</h2>';
        } else if (!firstQuoteDone && (line.startsWith('"') && line.endsWith('"'))) {
          firstQuoteDone = true;
        } else if (line.startsWith('> ')) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
        } else {
          if (!inParagraph) { html += '<p>'; inParagraph = true; }
          else { html += ' '; }
          html += line;
        }
      });

      if (inParagraph) html += '</p>';
      return html;
    }

    function extractQuote(text) {
      if (!text) return '';
      var lines = text.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (line.startsWith('"') && line.endsWith('"')) {
          return line.replace(/^"|"$/g, '');
        }
      }
      return '';
    }

    function renderGallery(images) {
      if (!images.length) return '';
      allImages = images;
      var display = images.slice(0, 4);
      var hasMore = images.length > 4;

      var html = '<div class="gallery"><div class="gallery-grid">';

      display.forEach(function(url, i) {
        html += '<div class="gallery-cell">';
        html += '<img src="' + url + '" alt="" loading="lazy" onclick="openLightbox(' + i + ')" />';
        if (i === 3 && hasMore) {
          html += '<button class="gallery-more-overlay" onclick="openLightbox(0)">More Photos</button>';
        }
        html += '</div>';
      });

      html += '</div></div>';
      return html;
    }

    function openLightbox(index) {
      lightboxIndex = index;
      document.getElementById('lightbox-img').src = allImages[lightboxIndex];
      document.getElementById('lightbox-counter').textContent = (lightboxIndex + 1) + ' / ' + allImages.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function lightboxNav(dir) {
      lightboxIndex = (lightboxIndex + dir + allImages.length) % allImages.length;
      document.getElementById('lightbox-img').src = allImages[lightboxIndex];
      document.getElementById('lightbox-counter').textContent = (lightboxIndex + 1) + ' / ' + allImages.length;
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowLeft') lightboxNav(-1);
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'Escape') closeLightbox();
    });

    function renderProperty(record) {
      var f = record.fields;
      var images = getImages(f);
      var heroImage = f['Hero Image'] || images[0] || '';
      var galleryImages = images.slice(1);
      var bookingUrl = f['Booking URL'] || '#';
      var bodyText = f['Full description'] || f['Description'] || '';
      var quote = extractQuote(bodyText);

      document.title = (f['Name'] || 'Property') + ' — Slow Casa';

      document.getElementById('app').innerHTML =
        '<div class="hero" style="overflow:visible;position:relative;">' +
          (heroImage
            ? '<img src="' + heroImage + '" alt="' + (f['Name'] || '') + '" />'
            : '<div class="hero-skeleton"></div>') +
          (images.length > 1 ? '<button class="hero-more-photos" onclick="openLightbox(0)">More Photos</button>' : '') +
        '</div>' +

        '<div class="content">' +
          '<h1 class="property-name">' + (f['Name'] || '') + '</h1>' +
          (quote ? '<p class="property-quote">"' + quote + '"</p>' : '') +
          '<div class="description">' + parseFullDescription(bodyText) + '</div>' +
          renderGallery(galleryImages) +
          '<div class="cta-section">' +
            '<p class="cta-label">Ready to stay here?</p>' +
            '<a href="' + bookingUrl + '" target="_blank" rel="noopener" class="cta-button">Book this property</a>' +
          '</div>' +
        '</div>';

      // Set allImages for lightbox after hero is rendered
      allImages = images;

      // Fetch related properties
      fetchRelated(record.id, f['Region'] || '', f['Country'] || '');
    }

    fetchProperty();

    async function fetchRelated(currentId, region, country) {
      try {
        var res = await fetch('/api/properties?all=true');
        var data = await res.json();
        var records = (data.records || []).filter(function(r) {
          if (r.id === currentId) return false;
          var f = r.fields;
          return f['Region'] === region || f['Country'] === country;
        });

        // Sort by Date added descending
        records.sort(function(a, b) {
          var da = a.fields['Date added'] ? new Date(a.fields['Date added']) : new Date(0);
          var db = b.fields['Date added'] ? new Date(b.fields['Date added']) : new Date(0);
          return db - da;
        });

        var top3 = records.slice(0, 3);
        if (!top3.length) return;

        var grid = document.getElementById('related-grid');
        grid.innerHTML = top3.map(function(r) {
          var f = r.fields;
          var img = f['Hero Image'] || (f['Images'] && f['Images'].length ? (f['Images'][0].thumbnails && f['Images'][0].thumbnails.full ? f['Images'][0].thumbnails.full.url : f['Images'][0].url) : '');
          var desc = f['Description'] ? f['Description'].substring(0, 80) + '...' : '';
          return '<a href="/property.html?id=' + r.id + '" style="text-decoration:none;color:inherit;">' +
            '<div class="related-card">' +
              '<div class="related-img">' +
                (img ? '<img src="' + img + '" alt="' + (f['Name']||'') + '" loading="lazy" />' : '') +
              '</div>' +
              '<p class="related-location">' + (f['Location label']||'') + '</p>' +
              '<p class="related-name">' + (f['Name']||'') + '</p>' +
              '<p class="related-desc">' + desc + '</p>' +
            '</div>' +
          '</a>';
        }).join('');

        document.getElementById('related-section').style.display = 'block';
      } catch (err) { console.error(err); }
    }
  </script>

</body>
</html>
