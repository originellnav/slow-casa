<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slow Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/slow-casa.css" />
  <style>
    body { font-family: var(--sans); background: var(--white); color: var(--black); }

    /* NAV — sticky white on property page */
    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 28px 48px;
      border-bottom: 0.5px solid var(--grey-3);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
    }

    .nav-links a { color: var(--grey-1); }
    .nav-links a:hover { color: var(--black); }

    /* HERO */
    .hero {
      width: 100%;
      height: 75vh;
      min-height: 400px;
      background: var(--grey-4);
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-skeleton {
      width: 100%;
      height: 100%;
      background: var(--grey-4);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* CONTENT */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 48px 0;
    }

    .property-meta { margin-bottom: 40px; }

    .location-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 16px;
    }

    .property-name {
      font-family: var(--serif);
      font-size: 48px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }

    .property-details {
      display: flex;
      gap: 24px;
      align-items: center;
      padding-bottom: 32px;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .detail-item {
      font-size: 12px;
      color: var(--grey-1);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .detail-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--grey-3);
    }

    /* FULL DESCRIPTION */
    .description {
      padding: 40px 0;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .description p {
      font-size: 17px;
      line-height: 1.85;
      color: var(--black);
      margin-bottom: 1.5em;
    }

    .description h2 {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 400;
      line-height: 1.25;
      margin: 2.5em 0 0.75em;
      letter-spacing: -0.01em;
    }

    .description blockquote {
      font-family: var(--serif);
      font-size: 22px;
      font-style: italic;
      line-height: 1.4;
      color: var(--grey-1);
      margin: 2em 0;
      padding-left: 24px;
      border-left: 2px solid var(--grey-3);
    }

    /* GALLERY GRID — 4 images max then more photos */
    .gallery {
      padding: 40px 0;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .gallery-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .gallery-grid img:hover { opacity: 0.9; }

    .gallery-grid img.gallery-first {
      grid-column: 1 / -1;
      aspect-ratio: 16/9;
    }

    .more-photos-btn {
      display: inline-block;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border: 0.5px solid var(--grey-3);
      background: transparent;
      color: var(--grey-1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .more-photos-btn:hover {
      border-color: var(--black);
      color: var(--black);
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      display: block;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 32px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--sans);
    }

    .lightbox-close:hover { color: var(--white); }

    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 32px;
      cursor: pointer;
      padding: 16px;
      line-height: 1;
    }

    .lightbox-prev:hover, .lightbox-next:hover { color: var(--white); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
    }

    /* CTA */
    .cta-section {
      padding: 64px 0 80px;
      text-align: center;
    }

    .cta-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 24px;
    }

    .cta-button {
      display: inline-block;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 16px 48px;
      border: 0.5px solid var(--black);
      background: transparent;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .cta-button:hover { background: var(--black); color: var(--white); }

    /* LOADING */
    .loading-state {
      text-align: center;
      padding: 120px 48px;
      font-size: 13px;
      color: var(--grey-1);
      letter-spacing: 0.06em;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .hero { height: 55vh; }
      .content { padding: 40px 24px 0; }
      .property-name { font-size: 32px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-grid img.gallery-first { aspect-ratio: 4/3; }
      .cta-section { padding: 48px 0 64px; }
      footer { padding: 24px; flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <nav>
    <div></div>
    <a href="/" class="wordmark">Slow Casa</a>
    <ul class="nav-links">
      <li><a href="/directory">Directory</a></li>
      <li><a href="/places">Places</a></li>
      <li><a href="#">Newsletter</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <div id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
    <button class="lightbox-prev" onclick="lightboxNav(-1)">&#8592;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <button class="lightbox-next" onclick="lightboxNav(1)">&#8594;</button>
    <span class="lightbox-counter" id="lightbox-counter"></span>
  </div>

  <footer>
    <span class="footer-word">Slow Casa</span>
    <div class="footer-links">
      <a href="/directory">← Back to directory</a>
    </div>
  </footer>

  <script>
    var RECORD_ID = new URLSearchParams(window.location.search).get('id');
    var allImages = [];
    var lightboxIndex = 0;

    async function fetchProperty() {
      if (!RECORD_ID) {
        document.getElementById('app').innerHTML = '<div class="loading-state">Property not found.</div>';
        return;
      }
      try {
        var res = await fetch('/api/property?id=' + RECORD_ID);
        var data = await res.json();
        if (data && data.fields) {
          renderProperty(data);
        } else {
          document.getElementById('app').innerHTML = '<div class="loading-state">Property not found.</div>';
        }
      } catch (err) {
        document.getElementById('app').innerHTML = '<div class="loading-state">Something went wrong.</div>';
      }
    }

    function getBestImageUrl(img) {
      // Use full resolution — prefer thumbnails.full if available, else main url
      if (img.thumbnails && img.thumbnails.full && img.thumbnails.full.url) {
        return img.thumbnails.full.url;
      }
      return img.url;
    }

    function getImages(fields) {
      var all = [];
      if (fields['Images'] && fields['Images'].length) {
        fields['Images'].forEach(function(img) { all.push(getBestImageUrl(img)); });
      }
      if (fields['Gallery'] && fields['Gallery'].length) {
        fields['Gallery'].forEach(function(img) { all.push(getBestImageUrl(img)); });
      }
      return all;
    }

    function parseFullDescription(text) {
      if (!text) return '';
      var html = '';
      var lines = text.split('\n');
      var inParagraph = false;

      lines.forEach(function(line) {
        line = line.trim();
        if (!line) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          return;
        }
        if (line.startsWith('## ')) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          html += '<h2>' + line.replace('## ', '') + '</h2>';
        } else if (line.startsWith('> ') || (line.startsWith('"') && line.endsWith('"'))) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          html += '<blockquote>' + line.replace(/^> /, '').replace(/^"|"$/g, '') + '</blockquote>';
        } else {
          if (!inParagraph) { html += '<p>'; inParagraph = true; }
          else { html += ' '; }
          html += line;
        }
      });

      if (inParagraph) html += '</p>';
      return html;
    }

    function renderGallery(images) {
      if (!images.length) return '';
      allImages = images;

      // Show max 4 images
      var displayImages = images.slice(0, 4);
      var hasMore = images.length > 4;

      var html = '<div class="gallery">';
      html += '<div class="gallery-grid">';

      displayImages.forEach(function(url, i) {
        var cls = i === 0 ? 'gallery-first' : '';
        html += '<img src="' + url + '" alt="" loading="lazy" class="' + cls + '" onclick="openLightbox(' + i + ')" />';
      });

      html += '</div>';

      if (hasMore) {
        html += '<button class="more-photos-btn" onclick="openLightbox(0)">+ ' + (images.length - 4) + ' more photos</button>';
      }

      html += '</div>';
      return html;
    }

    function openLightbox(index) {
      lightboxIndex = index;
      document.getElementById('lightbox-img').src = allImages[lightboxIndex];
      document.getElementById('lightbox-counter').textContent = (lightboxIndex + 1) + ' / ' + allImages.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function lightboxNav(dir) {
      lightboxIndex = (lightboxIndex + dir + allImages.length) % allImages.length;
      document.getElementById('lightbox-img').src = allImages[lightboxIndex];
      document.getElementById('lightbox-counter').textContent = (lightboxIndex + 1) + ' / ' + allImages.length;
    }

    // Close lightbox on background click
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowLeft') lightboxNav(-1);
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'Escape') closeLightbox();
    });

    function renderProperty(record) {
      var f = record.fields;
      var images = getImages(f);
      var heroImage = images[0] || '';
      var galleryImages = images.slice(1);
      var bookingUrl = f['Booking URL'] || '#';
      var sleeps = f['Sleeps'] ? 'Sleeps ' + f['Sleeps'] : '';
      var country = f['Country'] || '';
      var tag = f['Tags'] ? (Array.isArray(f['Tags']) ? f['Tags'][0] : f['Tags']) : '';

      // Use Full description if available, fall back to Description
      var bodyText = f['Full description'] || f['Description'] || '';

      document.title = (f['Name'] || 'Property') + ' — Slow Casa';

      var detailsHtml = '';
      if (sleeps) detailsHtml += '<span class="detail-item">' + sleeps + '</span>';
      if (sleeps && country) detailsHtml += '<div class="detail-dot"></div>';
      if (country) detailsHtml += '<span class="detail-item">' + country + '</span>';
      if (tag && (sleeps || country)) detailsHtml += '<div class="detail-dot"></div>';
      if (tag) detailsHtml += '<span class="detail-item">' + tag + '</span>';

      document.getElementById('app').innerHTML =
        '<div class="hero">' +
          (heroImage
            ? '<img src="' + heroImage + '" alt="' + (f['Name'] || '') + '" />'
            : '<div class="hero-skeleton"></div>') +
        '</div>' +

        '<div class="content">' +
          '<div class="property-meta">' +
            '<p class="location-label">' + (f['Location label'] || '') + '</p>' +
            '<h1 class="property-name">' + (f['Name'] || '') + '</h1>' +
            '<div class="property-details">' + detailsHtml + '</div>' +
          '</div>' +

          '<div class="description">' + parseFullDescription(bodyText) + '</div>' +

          renderGallery(galleryImages) +

          '<div class="cta-section">' +
            '<p class="cta-label">Ready to stay here?</p>' +
            '<a href="' + bookingUrl + '" target="_blank" rel="noopener" class="cta-button">Book this property</a>' +
          '</div>' +
        '</div>';
    }

    fetchProperty();
  </script>

</body>
</html>
