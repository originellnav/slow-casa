<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slow Casa</title>
  <meta name="description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --black: #0f0f0f;
      --grey-1: #888888;
      --grey-2: #bbbbbb;
      --grey-3: #e8e8e8;
      --grey-4: #f5f5f3;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
  

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--sans); background: var(--white); color: var(--black); }
    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    .wordmark {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      mix-blend-mode: normal;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.03em;
    }

    /* HERO */
    .hero {
      width: 100%;
      height: 90vh;
      min-height: 500px;
      background: var(--grey-4);
      position: relative;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-skeleton {
      width: 100%;
      height: 100%;
      background: var(--grey-4);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* CONTENT */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 48px 0;
    }

    .property-meta {
      margin-bottom: 40px;
    }

    .location-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 16px;
    }

    .property-name {
      font-family: var(--serif);
      font-size: 48px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }

    .property-details {
      display: flex;
      gap: 24px;
      align-items: center;
      padding-bottom: 32px;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .detail-item {
      font-size: 12px;
      color: var(--grey-1);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .detail-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--grey-3);
    }

    /* DESCRIPTION */
    .description {
      padding: 40px 0;
      font-size: 17px;
      line-height: 1.85;
      color: var(--black);
      border-bottom: 0.5px solid var(--grey-3);
    }

    /* GALLERY */
    .gallery {
      padding: 40px 0;
    }

    .gallery-full {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      margin-bottom: 8px;
    }

    .gallery-full img {
      width: 100%;
      height: 70vh;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .gallery-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .gallery-pair img {
      width: 100%;
      height: 340px
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .gallery-single {
      margin-bottom: 8px;
    }

    .gallery-single img {
      width: 100%;
      height: 500px
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* CTA */
    .cta-section {
      padding: 64px 0 80px;
      text-align: center;
      border-top: 0.5px solid var(--grey-3);
      margin-top: 40px;
    }

    .cta-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 24px;
    }

    .cta-button {
      display: inline-block;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 16px 48px;
      border: 0.5px solid var(--black);
      background: transparent;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 16px;
    }

    .cta-button:hover {
      background: var(--black);
      color: var(--white);
    }

    .cta-context {
      display: block;
      font-size: 12px;
      color: var(--grey-1);
    }

    /* FOOTER */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      border-top: 0.5px solid var(--grey-3);
      max-width: 100%;
    }

    .footer-word {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-1);
    }

    .footer-back {
      font-size: 12px;
      color: var(--grey-1);
      cursor: pointer;
    }

    .footer-back:hover { color: var(--black); }

    /* LOADING */
    .loading-state {
      text-align: center;
      padding: 120px 48px;
      font-size: 13px;
      color: var(--grey-1);
      letter-spacing: 0.06em;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .hero { height: 60vh; }
      .content { padding: 40px 24px 0; }
      .property-name { font-size: 32px; }
      .gallery-full img { height: 50vh; }
      .gallery-pair { grid-template-columns: 1fr; }
      .cta-section { padding: 48px 0 64px; }
      .footer { padding: 24px; flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="wordmark">Slow Casa</a>
    <ul class="nav-links">
      <li><a href="/#directory">Directory</a></li>
      <li><a href="#">Places</a></li>
      <li><a href="#">Newsletter</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <div id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <footer class="footer">
    <span class="footer-word">Slow Casa</span>
    <a href="/" class="footer-back">← Back to directory</a>
  </footer>

  <script>
    const RECORD_ID = new URLSearchParams(window.location.search).get('id');

    async function fetchProperty() {
      if (!RECORD_ID) {
        document.getElementById('app').innerHTML = '<div class="loading-state">Property not found.</div>';
        return;
      }
      try {
        const res = await fetch(`/api/property?id=${RECORD_ID}`);
        const data = await res.json();
        if (data && data.fields) {
          renderProperty(data);
        } else {
          document.getElementById('app').innerHTML = '<div class="loading-state">Property not found.</div>';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('app').innerHTML = '<div class="loading-state">Something went wrong.</div>';
      }
    }

    function getImages(fields) {
      const all = [];
      if (fields['Images'] && fields['Images'].length) {
        fields['Images'].forEach(img => all.push(img.url));
      }
      if (fields['Gallery'] && fields['Gallery'].length) {
        fields['Gallery'].forEach(img => all.push(img.url));
      }
      return all;
    }
function renderDescription(text) {
  if (!text) return '';
  return text
    .split('\n')
    .map(line => {
      if (line.startsWith('# ')) return `<h2 style="font-family:var(--serif);font-size:28px;font-weight:400;margin:2em 0 0.75em;letter-spacing:-0.01em">${line.slice(2)}</h2>`;
      if (line.startsWith('## ')) return `<h3 style="font-family:var(--serif);font-size:22px;font-weight:400;margin:2em 0 0.75em">${line.slice(3)}</h3>`;
      if (line.startsWith('**') && line.endsWith('**')) return `<h3 style="font-family:var(--serif);font-size:22px;font-weight:400;margin:2em 0 0.75em">${line.slice(2,-2)}</h3>`;
      if (line.startsWith('"') && line.endsWith('"')) return `<p style="font-family:var(--serif);font-size:22px;font-style:italic;line-height:1.5;margin:0 0 2em;color:var(--grey-1)">${line}</p>`;
      if (line.trim() === '') return '';
      return `<p style="margin-bottom:1.5em">${line}</p>`;
    })
    .join('');
}
    function renderGallery(images) {
      if (!images.length) return '';
      let html = '<div class="gallery">';
      let i = 0;

      while (i < images.length) {
        if (images[i] && images[i + 1]) {
          html += `<div class="gallery-pair"><img src="${images[i]}" alt="" loading="lazy" /><img src="${images[i+1]}" alt="" loading="lazy" /></div>`;
          i += 2;
        } else if (images[i]) {
          html += `<div class="gallery-single"><img src="${images[i]}" alt="" loading="lazy" /></div>`;
          i++;
        }
      }
html += `
  <div style="text-align:center;padding:32px 0 0;">
    <button onclick="openLightbox(0)" style="font-family:var(--sans);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:12px 32px;border:0.5px solid var(--black);background:transparent;color:var(--black);cursor:pointer;">
      All photos
    </button>
  </div>
  <div id="lightbox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;">
    <img id="lightbox-img" style="max-height:90vh;max-width:90vw;object-fit:contain;" />
    <button onclick="closeLightbox()" style="position:absolute;top:24px;right:32px;background:none;border:none;color:white;font-size:24px;cursor:pointer;">×</button>
    <button onclick="prevPhoto()" style="position:absolute;left:32px;background:none;border:none;color:white;font-size:32px;cursor:pointer;">‹</button>
    <button onclick="nextPhoto()" style="position:absolute;right:32px;background:none;border:none;color:white;font-size:32px;cursor:pointer;">›</button>
  </div>
`;
      html += '</div>';
      return html;
    }

    function renderProperty(record) {
      const f = record.fields;
      const images = getImages(f);
      const heroImage = images[0] || '';
      const galleryImages = images.slice(1);
      const bookingUrl = f['Booking URL'] || '#';
const fullDesc = f['Full description'] || f['Description'] || '';
      const bookingDomain = bookingUrl !== '#' ? new URL(bookingUrl).hostname.replace('www.', '') : '';
      const sleeps = f['Sleeps'] ? `Sleeps ${f['Sleeps']}` : '';
      const country = f['Country'] || '';
      const tag = f['Tags'] ? (Array.isArray(f['Tags']) ? f['Tags'][0] : f['Tags']) : '';

      document.title = `${f['Name'] || 'Property'} — Slow Casa`;

      document.getElementById('app').innerHTML = `
        <div class="hero">
          ${heroImage
            ? `<img src="${heroImage}" alt="${f['Name'] || ''}" />`
            : `<div class="hero-skeleton"></div>`
          }
        </div>

        <div class="content">
          <div class="property-meta">
            <p class="location-label">${f['Location Label'] || ''}</p>
            <h1 class="property-name">${f['Name'] || ''}</h1>
            <div class="property-details">
              ${sleeps ? `<span class="detail-item">${sleeps}</span>` : ''}
              ${sleeps && country ? `<div class="detail-dot"></div>` : ''}
              ${country ? `<span class="detail-item">${country}</span>` : ''}
              ${tag && (sleeps || country) ? `<div class="detail-dot"></div>` : ''}
              ${tag ? `<span class="detail-item">${tag}</span>` : ''}
            </div>
          </div>

<div class="description">
  ${renderDescription(fullDesc)}
</div>

          ${renderGallery(galleryImages)}

          <div class="cta-section">
            <p class="cta-label">Ready to stay here?</p>
            <a href="${bookingUrl}" target="_blank" rel="noopener" class="cta-button">Book this property</a>
            ${bookingDomain ? `<span class="cta-context">Book direct via ${bookingDomain}</span>` : ''}
          </div>
        </div>
      `;
    }

    fetchProperty();
    let lightboxImages = [];
let lightboxIndex = 0;

function openLightbox(index) {
  lightboxImages = Array.from(document.querySelectorAll('.gallery img')).map(img => img.src);
  lightboxIndex = index;
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = lightboxImages[lightboxIndex];
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

function prevPhoto() {
  lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
  document.getElementById('lightbox-img').src = lightboxImages[lightboxIndex];
}

function nextPhoto() {
  lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
  document.getElementById('lightbox-img').src = lightboxImages[lightboxIndex];
}
  </script>

</body>
</html>
