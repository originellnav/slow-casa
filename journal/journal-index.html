<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal — Slow Casa</title>
  <meta name="description" content="Location guides, slow living stories and interviews from Slow Casa." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/slow-casa.css" />
  <style>
    body { font-family: var(--sans); background: var(--white); color: var(--black); }

    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 28px 48px;
      border-bottom: 0.5px solid var(--grey-3);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
    }

    .nav-links a { color: var(--grey-1); }
    .nav-links a:hover { color: var(--black); }

    .page-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 48px 48px;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .page-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 16px;
    }

    .page-title {
      font-family: var(--serif);
      font-size: 42px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .filters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 48px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 0.5px solid var(--grey-3);
    }

    .filter-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-right: 8px;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 16px;
      border: 0.5px solid var(--grey-3);
      background: transparent;
      color: var(--grey-1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active { background: var(--black); border-color: var(--black); color: var(--white); }

    .journal-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 48px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px 32px;
    }

    .journal-card { cursor: pointer; }
    .journal-card:hover .journal-img img { transform: scale(1.03); }

    .journal-img {
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      margin-bottom: 20px;
      background: var(--grey-4);
    }

    .journal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }

    .journal-category {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-bottom: 8px;
    }

    .journal-title {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--black);
    }

    .loading { text-align: center; padding: 80px; font-size: 13px; color: var(--grey-1); letter-spacing: 0.06em; grid-column: 1/-1; }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .page-header { padding: 40px 24px 32px; }
      .page-title { font-size: 30px; }
      .filters { padding: 20px 24px; }
      .journal-grid { grid-template-columns: 1fr; padding: 32px 24px 56px; gap: 40px; }
      footer { padding: 24px; flex-direction: column; gap: 20px; text-align: center; }
      .footer-links { flex-wrap: wrap; justify-content: center; gap: 16px; }
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B930Z6F96Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B930Z6F96Z');
  </script>
</head>
<body>

  <nav>
    <div></div>
    <a href="/" class="wordmark">Slow Casa</a>
    <ul class="nav-links">
      <li><a href="/directory">Directory</a></li>
      <li><a href="/journal">Journal</a></li>
      <li><a href="https://slowcasa.beehiiv.com/subscribe" target="_blank" rel="noopener">Newsletter</a></li>
      <li><a href="/criteria">About</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <p class="page-label">Editorial</p>
    <h1 class="page-title">Journal</h1>
  </div>

  <div class="filters">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('places', this)">Places</button>
    <button class="filter-btn" onclick="setFilter('interviews', this)">Interviews</button>
    <button class="filter-btn" onclick="setFilter('stories', this)">Stories</button>
  </div>

  <div class="journal-grid" id="journal-grid">
    <div class="loading">Loading...</div>
  </div>

  <footer>
    <span class="footer-word">Slow Casa</span>
    <div class="footer-links">
      <a href="/directory">Directory</a>
      <a href="/journal">Journal</a>
      <a href="#">Newsletter</a>
      <a href="#">Instagram</a>
    </div>
  </footer>

  <script>
    var allPosts = [];
    var activeFilter = 'all';

    async function fetchPosts() {
      try {
        var res = await fetch('/api/journal');
        var data = await res.json();
        allPosts = data || [];
        renderPosts();
      } catch (err) {
        document.getElementById('journal-grid').innerHTML = '<div class="loading">Failed to load posts.</div>';
      }
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderPosts();
    }

    function renderPosts() {
      var grid = document.getElementById('journal-grid');
      var filtered = activeFilter === 'all' ? allPosts : allPosts.filter(function(p) { return p.category === activeFilter; });

      if (!filtered.length) {
        grid.innerHTML = '<div class="loading">No posts yet.</div>';
        return;
      }

      grid.innerHTML = filtered.map(function(post) {
        var url = '/journal/' + (post.category || 'places') + '/' + post.slug;
        return '<a href="' + url + '" style="text-decoration:none;color:inherit;">' +
          '<div class="journal-card">' +
            '<div class="journal-img">' +
              (post.heroImage ? '<img src="' + post.heroImage + '" alt="' + post.title + '" loading="lazy" />' : '') +
            '</div>' +
            '<p class="journal-category">' + (post.category || 'places') + (post.location ? ' · ' + post.location : '') + '</p>' +
            '<h2 class="journal-title">' + post.title + '</h2>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    fetchPosts();
  </script>

</body>
</html>
