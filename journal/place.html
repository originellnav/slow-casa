    body { font-family: var(--sans); background: var(--white); color: var(--black); }
    nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 28px 48px; border-bottom: 0.5px solid var(--grey-3); position: sticky; top: 0; background: var(--white); z-index: 100; }

    .article-body p { font-size: 17px; line-height: 1.85; color: var(--black); margin-bottom: 1.5em; }
    .article-body h2 { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.25; margin: 2.5em 0 0.75em; letter-spacing: -0.01em; }
    .article-body h3 { font-size: 14px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-1); margin: 2em 0 0.75em; }
    .article-body a { color: var(--black); border-bottom: 0.5px solid var(--grey-3); transition: border-color 0.2s; }
